# ===============================
# SERVER CONFIGURATION
# ===============================
server.port= # ex: 9000
server.address= # ex: 0.0.0.0
server.servlet.context-path= # ex: /tasksmanager
server.max-http-header-size= # ex: 65536

# ===============================
# APPLICATION
# ===============================
spring.application.name= # ex: TasksManager

# ===============================
# DATABASE (MYSQL)
# ===============================
spring.datasource.url= # ex: jdbc:mysql://localhost:3306/tasksmanager_global?createDatabaseIfNotExist=true
spring.datasource.username= # ex: root
spring.datasource.password= # ex: yourpassword
spring.datasource.driver-class-name= # ex: com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto= # ex: update
spring.jpa.show-sql= # ex: true
spring.jpa.properties.hibernate.format_sql= # ex: true
spring.jpa.properties.hibernate.dialect= # ex: org.hibernate.dialect.MySQL8Dialect

# ===============================
# JWT SECURITY
# ===============================
kouetcha.app.jwtSecret= # ex: yourSuperSecretKey
kouetcha.app.jwtExpirationMs= # ex: 86400000

# ===============================
# REDIS CONFIGURATION
# ===============================
spring.data.redis.host= # ex: localhost
spring.data.redis.port= # ex: 6379
spring.data.redis.password= # ex: yourRedisPassword (optionnel)

# ===============================
# CACHE CONFIGURATION
# ===============================
spring.cache.type= # ex: redis
spring.cache.redis.time-to-live= # ex: 600000
spring.cache.redis.key-prefix= # ex: tasksmanager::
spring.cache.redis.enable-statistics= # ex: true

# ===============================
# CLIENT URL (FRONTEND)
# ===============================
client.url= # ex: http://localhost:4200
allowed_origin= # ex: http://localhost:4200

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size= # ex: 200MB
spring.servlet.multipart.max-request-size= # ex: 200MB

# ===============================
# WEBSOCKET
# ===============================
spring.websocket.max-text-message-size= # ex: 128MB
spring.websocket.max-binary-message-size= # ex: 128MB

# ===============================
# ADMIN DEFAULT ACCOUNT
# ===============================
admin.email= # ex: admin@example.com
admin.password= # ex: adminPassword

# ===============================
# MEDIA STORAGE
# ===============================
media.document.tache= # ex: ./media/document/tache/
media.document.activite= # ex: ./media/document/activite/
media.document.projet= # ex: ./media/document/projet/

media.commentaire.tache= # ex: ./media/commentaire/tache/
media.commentaire.activite= # ex: ./media/commentaire/activite/
media.commentaire.projet= # ex: ./media/commentaire/projet/

media.userProfil= # ex: ./media/userProfil/

# ===============================
# SPRING MVC
# ===============================
spring.mvc.pathmatch.matching-strategy= # ex: ant-path-matcher