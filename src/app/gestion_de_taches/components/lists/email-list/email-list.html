<div class="email-list">
  <!-- En-tête avec compteur et boutons -->
  <div class="flex items-center justify-between mb-2">
    <p class="text-xs font-medium text-gray-500 dark:text-gray-400">
      Emails ({{ emails.length }})
    </p>
    <div class="flex space-x-2">
      <!-- Bouton voir tout -->
      <button *ngIf="emails.length > 0" 
              (click)="openViewAllModal()"
              class="text-xs text-indigo-600 hover:text-indigo-800 dark:text-indigo-400 dark:hover:text-indigo-300 flex items-center focus:outline-none focus:ring-2 focus:ring-indigo-500 rounded"
              matTooltip="Voir tous les emails">
        <mat-icon class="text-sm mr-1">zoom_out_map</mat-icon>
        Voir tout
      </button>
      <!-- Bouton d'ajout -->
      <button (click)="showAddInput = !showAddInput"
              class="text-xs text-green-600 hover:text-green-800 dark:text-green-400 dark:hover:text-green-300 flex items-center focus:outline-none focus:ring-2 focus:ring-green-500 rounded"
              matTooltip="Ajouter un email">
        <mat-icon class="text-sm mr-1">add</mat-icon>
        Ajouter
      </button>
    </div>
  </div>

  <!-- Input d'ajout inline -->
  <div *ngIf="showAddInput" class="mb-2 flex items-center space-x-2">
    <input
      #newEmailInput
      type="email"
      [(ngModel)]="newEmail"
      (keyup.enter)="addEmail()"
      placeholder="Nouvel email"
      class="flex-1 px-2 py-1 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
    />
    <button (click)="addEmail()" 
            class="px-2 py-1 bg-indigo-600 text-white text-xs rounded hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            [disabled]="!newEmail.trim()">
      OK
    </button>
    <button (click)="cancelAdd()" 
            class="px-2 py-1 bg-gray-300 dark:bg-gray-600 text-gray-700 dark:text-gray-200 text-xs rounded hover:bg-gray-400 dark:hover:bg-gray-500 focus:outline-none focus:ring-2 focus:ring-gray-500">
      Annuler
    </button>
  </div>

  <!-- Liste paginée -->
  <div class="space-y-2" *ngIf="paginatedEmails.length > 0; else noEmails">
    <app-email-card
      *ngFor="let email of paginatedEmails"
      [emailDto]="email"
      [emailType]="emailType"
      (update)="onEmailUpdated($event)"
      (delete)="onEmailDeleted($event)"
      (toggleActive)="onEmailUpdated($event)"
    ></app-email-card>
  </div>

  <!-- Message si aucun email -->
  <ng-template #noEmails>
    <p class="text-sm text-gray-500 dark:text-gray-400 italic">Aucun email</p>
  </ng-template>

  <!-- Pagination -->
  <div *ngIf="emails.length > pageSize" class="flex items-center justify-between mt-3">
    <button (click)="previousPage()" [disabled]="currentPage === 1"
            class="px-2 py-1 text-xs border border-gray-300 dark:border-gray-600 rounded disabled:opacity-50 
                   bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-200 
                   hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors
                   focus:outline-none focus:ring-2 focus:ring-indigo-500">
      Précédent
    </button>
    <span class="text-xs text-gray-700 dark:text-gray-300">Page {{ currentPage }} / {{ totalPages }}</span>
    <button (click)="nextPage()" [disabled]="currentPage === totalPages"
            class="px-2 py-1 text-xs border border-gray-300 dark:border-gray-600 rounded disabled:opacity-50
                   bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-200 
                   hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors
                   focus:outline-none focus:ring-2 focus:ring-indigo-500">
      Suivant
    </button>
  </div>
</div>
