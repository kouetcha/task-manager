<h2 mat-dialog-title class="dark:text-gray-100">Tous les emails ({{ data.emails.length }})</h2>

<mat-dialog-content class="dark:text-gray-200">
  <div class="space-y-2 pt-1">

   @if(data.isCreateur)
   { <!-- Bouton d'ajout -->
    <div class="flex justify-end mb-2">
      <button (click)="showAddInput = true"
              *ngIf="!showAddInput"
              class="text-xs text-green-600 hover:text-green-800 dark:text-green-400 dark:hover:text-green-300 flex items-center py-1 focus:outline-none focus:ring-2 focus:ring-green-500 rounded"
              matTooltip="Ajouter un email">
        <mat-icon class="text-sm mr-1">add</mat-icon>
        Ajouter
      </button>
    </div>}

    <!-- Input d'ajout -->
    <div *ngIf="showAddInput" class="mb-2 flex items-center space-x-2">
      <input
        #newEmailInput
        type="email"
        [(ngModel)]="newEmail"
        (keyup.enter)="addEmail()"
        placeholder="Nouvel email"
        class="flex-1 px-2 py-1 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
      <button
        (mousedown)="$event.preventDefault()"
        (click)="addEmail()"
        class="px-2 py-1 bg-indigo-600 text-white text-xs rounded hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        [disabled]="!newEmail.trim()">
        OK
      </button>
      <button
        (mousedown)="$event.preventDefault()"
        (click)="cancelAdd()"
        class="px-2 py-1 bg-gray-300 dark:bg-gray-600 text-gray-700 dark:text-gray-200 text-xs rounded hover:bg-gray-400 dark:hover:bg-gray-500 focus:outline-none focus:ring-2 focus:ring-gray-500">
        Annuler
      </button>
    </div>

    <!-- Liste emails -->
    <div class="space-y-2 max-h-96 overflow-y-auto pr-2 pb-10">
      <app-email-card
        *ngFor="let email of data.emails"
        [emailDto]="email"
        [emailType]="data.emailType"
        (update)="onEmailUpdated($event)"
        (delete)="onEmailDeleted($event)"
        (toggleActive)="onEmailUpdated($event)"
      ></app-email-card>
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close class="dark:text-gray-300">Fermer</button>
</mat-dialog-actions>
