<h2 mat-dialog-title class="dark:text-gray-100">Tous les fichiers ({{ data.files.length }})</h2>
<mat-dialog-content class="dark:text-gray-200">
  <div class="space-y-2 max-h-96 overflow-y-auto pr-2">
    <!-- Bouton d'ajout dans la modale -->
    <div class="flex justify-end mb-2">
      <button (click)="fileInput.click()" 
              class="text-xs text-green-600 hover:text-green-800 dark:text-green-400 dark:hover:text-green-300 flex items-center focus:outline-none focus:ring-2 focus:ring-green-500 rounded"
              matTooltip="Ajouter un fichier">
        <mat-icon class="text-sm mr-1">attach_file</mat-icon>
        Ajouter
      </button>
      <input #fileInput type="file" multiple (change)="onFilesSelected($event)" style="display: none" />
    </div>

    <!-- Liste de tous les fichiers -->
    <app-file-card
      *ngFor="let file of data.files"
      [file]="file"
      (view)="onView($event)"
      (delete)="onDelete($event)"
    ></app-file-card>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close class="dark:text-gray-300">Fermer</button>
</mat-dialog-actions>
