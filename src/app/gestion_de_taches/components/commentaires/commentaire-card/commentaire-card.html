<!-- Wrapper alignement gauche/droite -->
<div class="flex mb-1" [ngClass]="isOwner ? 'justify-end' : 'justify-start'">

  <!-- Avatar (affiché seulement si pas owner) -->
  <img
    *ngIf="!isOwner"
    [src]="commentaire.auteur?.profilePictureLink || './assets/default-avatar.png'"
    alt="Avatar"
    class="w-8 h-8 rounded-full object-cover border border-gray-200 dark:border-gray-700 flex-shrink-0 mt-1 mr-2"
  />

  <!-- Bulle -->
  <div class="max-w-[75%] group relative">

    <!-- Nom (affiché seulement si pas owner) -->
    <p *ngIf="!isOwner" class="text-xs font-semibold text-blue-600 dark:text-blue-400 mb-0.5 ml-1">
      {{ commentaire.auteur?.fullName || commentaire.auteur.nom + ' ' + commentaire.auteur.prenom }}
    </p>

    <!-- Bulle principale -->
    <div
      [ngClass]="isOwner
        ? 'bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white rounded-[18px] rounded-tr-sm'
        : 'bg-white dark:bg-gray-800 text-gray-900 dark:text-white rounded-[18px] rounded-tl-sm border border-gray-100 dark:border-gray-700'"
      class="px-4 py-2.5 shadow-sm relative"
    >
      <!-- Mode lecture -->
      <div *ngIf="!editing; else editMode">
        <p class="text-sm whitespace-pre-wrap break-words leading-relaxed">
          {{ commentaire.contenu }}
        </p>

        <!-- Pièces jointes -->
        <div *ngIf="commentaire.fichiers?.length|| isOwner  " class="mt-2">
          <!-- La couleur du texte est héritée du parent, pas besoin de forcer -->
          <app-file-list
            [files]="commentaire.fichiers||[]"
            (viewFile)="onView($event)"
            (addFiles)="onAddFichiers($event)"
            (deleteFile)="onDelete($event)">
          </app-file-list>
        </div>

        <!-- Date + menu -->
        <div class="flex items-center gap-1 mt-1" [ngClass]="isOwner ? 'justify-end' : 'justify-start'">
          <span class="text-[10px]" [ngClass]="isOwner ? 'text-gray-600 dark:text-gray-300' : 'text-gray-400 dark:text-gray-500'">
            {{ commentaire.date | date:'HH:mm' }}
          </span>
          <!-- Double check owner -->
          <mat-icon *ngIf="isOwner" style="font-size:12px;width:12px;height:12px;" class="text-gray-600 dark:text-gray-300">done_all</mat-icon>
        </div>
      </div>

      <!-- Mode édition -->
      <ng-template #editMode>
        <textarea
          [(ngModel)]="editedContent"
          class="w-full p-2 rounded-md text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"
          rows="3"
        ></textarea>
        <div class="flex gap-2 mt-2">
          <button (click)="saveEdit()"
            class="px-3 py-1 bg-green-500 hover:bg-green-600 text-white rounded-full text-xs flex items-center gap-1 transition-colors">
            <mat-icon style="font-size:14px;width:14px;height:14px;">check</mat-icon> Sauvegarder
          </button>
          <button (click)="cancelEdit()"
            class="px-3 py-1 bg-gray-200 hover:bg-gray-300 dark:bg-gray-600 dark:hover:bg-gray-500 text-gray-800 dark:text-white rounded-full text-xs flex items-center gap-1 transition-colors">
            <mat-icon style="font-size:14px;width:14px;height:14px;">close</mat-icon> Annuler
          </button>
        </div>
      </ng-template>
    </div>

    <!-- Bouton menu (apparaît au hover) -->
    <button
      *ngIf="isOwner && !editing"
      [matMenuTriggerFor]="menu"
      mat-icon-button
      class="absolute -top-2 -left-8 opacity-0 group-hover:opacity-100 transition-opacity w-7 h-7 bg-white dark:bg-gray-700 shadow rounded-full flex items-center justify-center"
    >
      <mat-icon style="font-size:16px;width:16px;height:16px;" class="text-gray-500 dark:text-gray-400">more_vert</mat-icon>
    </button>

    <mat-menu #menu="matMenu">
      <button mat-menu-item (click)="startEdit()">
        <mat-icon>edit</mat-icon>
        <span>Modifier</span>
      </button>
      <button mat-menu-item (click)="deleteComment()" class="text-red-500">
        <mat-icon class="text-red-500">delete</mat-icon>
        <span>Supprimer</span>
      </button>
    </mat-menu>
  </div>

  <!-- Avatar owner (droite) -->
  <img
    *ngIf="isOwner"
    [src]="commentaire.auteur?.profilePictureLink || './assets/default-avatar.png'"
    alt="Avatar"
    class="w-8 h-8 rounded-full object-cover border border-gray-300 dark:border-gray-600 flex-shrink-0 mt-1 ml-2"
  />
</div>
