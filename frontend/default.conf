server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ===============================
    # COMPRESSION
    # ===============================
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ===============================
    # ANGULAR — routing côté client
    # ===============================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===============================
    # PROXY BACKEND — API REST
    # ===============================
    location /tasksmanager/ {
        proxy_pass http://backend:9000/tasksmanager/;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ===============================
    # REDIRECTION /onlyoffice → /onlyoffice/
    # ===============================
    location = /onlyoffice {
        return 301 /onlyoffice/;
    }

    # ===============================
    # PROXY ONLYOFFICE — VERSION SIMPLIFIÉE (SANS sub_filter)
    # ===============================
    location ^~ /onlyoffice/ {
        proxy_pass http://onlyoffice:80/;
        
        # Headers standards
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Support WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        # Désactiver le buffering (crucial pour les fichiers binaires)
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Timeouts
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ===============================
    # CACHE FICHIERS STATIQUES Angular
    # ===============================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ===============================
    # SÉCURITÉ
    # ===============================
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}