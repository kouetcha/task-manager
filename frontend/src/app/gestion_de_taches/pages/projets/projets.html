<!-- src/app/gestion_de_taches/pages/projets/projets.component.html -->
<div class="min-h-screen bg-gray-50 dark:bg-gray-900 p-3 sm:p-6">

  <!-- Header -->
  <div class="mb-4 sm:mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between">
    <h1 class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white mb-3 sm:mb-0">
      Mes Projets
    </h1>
    <button
      (click)="openCreateDialog()"
      class="inline-flex items-center justify-center px-3 py-1.5 sm:px-4 sm:py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors w-full sm:w-auto"
      [disabled]="loading">
      <mat-icon class="mr-1 text-sm" style="font-size:18px; width:18px; height:18px;">add</mat-icon>
      Nouveau projet
    </button>
  </div>

  <!-- Conteneur principal -->
  <ng-container *ngIf="!loading; else loadingTemplate">

    <!-- Filtres -->
    <div class="mb-4 sm:mb-6 grid grid-cols-1 sm:grid-cols-2 gap-2 sm:gap-4">
      <div class="relative">
        <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm" style="font-size:18px; width:18px; height:18px;">search</mat-icon>
        <input
          type="text"
          [(ngModel)]="searchTerm"
          (ngModelChange)="onSearch()"
          placeholder="Rechercher un projet..."
          class="w-full pl-9 pr-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 dark:bg-gray-800 dark:text-white"
        />
      </div>
      <div>
        <select
          [(ngModel)]="selectedStatus"
          (ngModelChange)="onStatusChange()"
          class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 dark:bg-gray-800 dark:text-white">
          <option *ngFor="let status of statusOptions" [value]="status">
            {{ status === 'TOUS' ? 'Tous les statuts' : getStatusLabel(status) }}
          </option>
        </select>
      </div>
    </div>

    <!-- Cas 1: Projets disponibles -->
    <ng-container *ngIf="filteredProjets.length > 0">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-[repeat(auto-fit,minmax(320px,1fr))] gap-3 sm:gap-6">
        <div *ngFor="let projet of filteredProjets"
             class="bg-white dark:bg-gray-800 rounded-lg shadow-sm sm:shadow-md hover:shadow-lg transition-shadow">
          <app-project-card
            [user]="user()!"
            [projet]="projet"
            (edit)="openEditDialog($event)"
            (delete)="openDeleteDialog($event)"
            (editEmail)="onEditEmail($event)"
            (ajoutFichiers)="onAddFiles(projet, $event)"
            (editableChamps)="onApplieELementChange($event)">
          </app-project-card>
        </div>
      </div>

      <!-- Paginator -->
    <div *ngIf="totalElements" class="mt-4 sm:mt-6 mb-1 flex justify-center">
      <mat-paginator
        [length]="totalElements"
        [pageSize]="pageSize"
        [pageSizeOptions]="pageSizeOptions"
        [pageIndex]="currentPage"
        (page)="onPageChange($event)"
        showFirstLastButtons
        aria-label="Sélectionner la page">
      </mat-paginator>
    </div>
    </ng-container>

    <!-- Cas 2: Aucun projet -->
    <div *ngIf="totalElements === 0 && !searchTerm && selectedStatus === 'TOUS'"
         class="text-center py-10 sm:py-12">
      <mat-icon class="text-5xl sm:text-6xl text-gray-400 mb-3">folder_open</mat-icon>
      <h3 class="text-base sm:text-lg font-medium text-gray-900 dark:text-white mb-2">
        Aucun projet pour le moment
      </h3>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">
        Commencez par créer votre premier projet !
      </p>
      <button (click)="openCreateDialog()"
              class="inline-flex items-center justify-center px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors">
        <mat-icon class="mr-1" style="font-size:18px; width:18px; height:18px;">add</mat-icon>
        Créer un projet
      </button>
    </div>

    <!-- Cas 3: Aucun résultat après filtrage -->
    <div *ngIf="totalElements > 0 && filteredProjets.length === 0"
         class="text-center py-10 sm:py-12">
      <mat-icon class="text-5xl sm:text-6xl text-gray-400 mb-3">search_off</mat-icon>
      <h3 class="text-base sm:text-lg font-medium text-gray-900 dark:text-white mb-2">
        Aucun résultat
      </h3>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">
        Aucun projet ne correspond à vos critères de recherche.
      </p>
      <button (click)="resetFilters()"
              class="text-sm text-indigo-600 dark:text-indigo-400 hover:underline">
        Effacer les filtres
      </button>
    </div>

  </ng-container>

  <!-- Spinner Loading -->
  <ng-template #loadingTemplate>
    <div class="flex justify-center py-12">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  </ng-template>

</div>
