<!-- Bouton flottant de navigation (FAB) -->
@if (projet) {
  <button
    mat-fab
    class="!fixed bottom-[15rem] right-[0.1rem] z-[9] bg-indigo-600 text-white shadow-lg hover:bg-indigo-700"
    [matMenuTriggerFor]="navMenu"
    aria-label="Navigation rapide"
    matTooltip="Aller à une section"
    matTooltipPosition="left">
    <mat-icon>menu_book</mat-icon>
  </button>

  <mat-menu #navMenu="matMenu">
    <ng-template matMenuContent>
      <button mat-menu-item (click)="scrollTo('section-projet')">
        <mat-icon>info</mat-icon>
        <span>Détails du projet</span>
      </button>
      <button mat-menu-item (click)="scrollTo('section-activites')">
        <mat-icon>list_alt</mat-icon>
        <span>Activités</span>
      </button>
      @if (activiteSelected) {
        <button mat-menu-item (click)="scrollTo('section-taches')">
          <mat-icon>checklist</mat-icon>
          <span>Tâches de l'activité</span>
        </button>
      }
    </ng-template>
  </mat-menu>
}

<!-- Bouton retour en haut -->
@if (showScrollTop) {
  <button
    (click)="scrollToTop()"
    class="fixed bottom-6 right-6 z-50 p-2.5 sm:p-3 bg-indigo-600 text-white rounded-full shadow-lg hover:bg-indigo-700 transition-opacity"
    aria-label="Retour en haut">
    <mat-icon>arrow_upward</mat-icon>
  </button>
}

<!-- Conteneur principal : px réduit sur mobile -->
<div class="max-w-7xl mx-auto px-2 sm:px-4 lg:px-8 py-3 sm:py-6">

  <!-- En-tête -->
  <div class="flex items-center justify-between mb-4 sm:mb-6 gap-2">
    <button
      (click)="goBack()"
      class="flex items-center text-indigo-600 dark:text-indigo-400 hover:underline flex-shrink-0">
      <mat-icon class="text-base" style="font-size:20px;width:20px;height:20px;">arrow_back</mat-icon>
      <span class="ml-1 text-sm sm:text-base hidden xs:inline">Retour aux projets</span>
    </button>

    <h1 class="text-base sm:text-2xl font-bold text-gray-900 dark:text-white truncate text-center flex-1 min-w-0">
      {{ projet?.designation || 'Projet' }}
    </h1>

    <!-- Espace équilibrant le bouton retour -->
    <div class="w-6 sm:w-10 flex-shrink-0"></div>
  </div>

  <!-- Contenu principal -->
  @if (projet) {

    <!-- Section Détails -->
    <section id="section-projet" class="scroll-mt-16 sm:scroll-mt-20 mb-4 sm:mb-10">
      <app-projet-card-detail
        (editableChamps)="onApplieELementChange($event)"
        [projet]="projet"
        [currentUserId]="getUser()?.id || 0"
        [currentUserProfilePicture]="getUser()?.profilePictureLink || ''"
        (viewFile)="onViewFile($event)"
        (deleteFile)="onDeleteFile($event, 'projet', projet.id)"
        (ajoutFichiers)="onAddFiles(projet, $event)">
      </app-projet-card-detail>
    </section>

    <!-- Section Activités -->
    <section id="section-activites" class="scroll-mt-16 sm:scroll-mt-20 mb-4 sm:mb-10">
      <div class="flex items-center gap-2 mb-2 sm:mb-4">
        <mat-icon class="text-indigo-600 text-base" style="font-size:20px;width:20px;height:20px;">list_alt</mat-icon>
        <h2 class="text-base sm:text-xl font-semibold text-gray-900 dark:text-white">Activités</h2>
      </div>
      <app-activite-section
        [projetId]="projetId"
        (viewFile)="onViewFile($event)"
        (activiteSelected)="onActiviteSelected($event)"
        [currentUserId]="getUser()?.id || 0"
        [currentUserEmail]="getUser()?.email || ''"
        [currentUserProfilePicture]="getUser()?.profilePictureLink || ''"
        (activiteSelectedDelete)="onActiviteSelectedDelete($event)"
        (deleteFile)="onDeleteFile($event.file, 'activite', $event.id)">
      </app-activite-section>
    </section>

    <!-- Section Tâches (conditionnelle) -->
    @if (activiteSelected) {
      <section id="section-taches" class="scroll-mt-16 sm:scroll-mt-20 mb-4 sm:mb-10">
        <div class="flex items-center gap-2 mb-2 sm:mb-4 min-w-0">
          <mat-icon class="text-indigo-600 flex-shrink-0 text-base" style="font-size:20px;width:20px;height:20px;">checklist</mat-icon>
          <h2 class="text-sm sm:text-xl font-semibold text-gray-900 dark:text-white truncate">
            Tâches : {{ activiteSelected.designation }}
          </h2>
        </div>
        <app-tache-section
          [selectedTache]="tacheSelected"
          [activiteId]="activiteSelected.id"
          (tacheSelected)="onTacheSelected($event)"
          (tacheSelectedDelete)="onTacheSelectedDelete($event)"
          [currentUserId]="getUser()?.id || 0"
          [currentUserEmail]="getUser()?.email || ''"
          (viewFile)="onViewFile($event)"
          (deleteFile)="onDeleteFile($event.file, 'tache', $event.id)">
        </app-tache-section>
      </section>
    }

  } @else {
    <ng-container *ngTemplateOutlet="loadingTemplate"></ng-container>
  }
</div>

<!-- Modals -->
<app-pdf-modal
  [isOpen]="isPdfModalOpen"
  [pdfUrl]="pdfPreviewUrl"
  [fileName]="fileName"
  (closed)="onPdfModalClosed()">
</app-pdf-modal>

<app-onlyoffice-viewer
  *ngIf="isOnlyOfficeModalOpen"
  [fileInfo]="fichierInfo!"
  [mode]="'view'"
  (closed)="onOnlyOfficeModalClosed()"
  (error)="onViewerError($event)">
</app-onlyoffice-viewer>

<ng-template #loadingTemplate>
  <div class="flex justify-center py-12">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
</ng-template>
