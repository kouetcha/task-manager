@if(tache) {
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 overflow-hidden transition-shadow hover:shadow-xl flex flex-col"
       [style.height]="isCollapsed ? 'auto' : 'calc(100vh - 20px)'">
    
    <!-- Header -->
    <div 
      class="flex-shrink-0 flex items-center justify-between p-4 lg:p-6 cursor-pointer select-none bg-gradient-to-r from-gray-50 to-white dark:from-gray-800 dark:to-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors duration-200"
      (click)="isCollapsed = !isCollapsed"
    >
      <div class="flex items-center gap-4">
        <svg class="w-5 h-5 text-gray-500 dark:text-gray-400 transition-transform duration-300"
          [class.rotate-180]="!isCollapsed"
          xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
        </svg>
        <div class="text-xl lg:text-2xl font-bold text-gray-900 dark:text-white">
          <app-editable-text 
            [value]="tache.designation" 
            [isCreateur]="isCreateur()"
            (valueChange)="onDesignationChange($event)"
            (click)="$event.stopPropagation()">
          </app-editable-text>
        </div>
      </div>
      <span [class]="'px-3 py-1 rounded-full text-xs font-semibold shadow-sm ' + getStatusColor(tache.status)">
        {{ getStatusLabel(tache.status) }}
      </span>
    </div>

    <!-- Contenu : flex-1 pour prendre tout l'espace restant -->
    <div *ngIf="!isCollapsed" class="flex-1 min-h-0 overflow-hidden">

      <!-- MOBILE : empilement vertical -->
      <div class="flex flex-col h-full lg:hidden">
        
        <!-- Détails mobile : 45% de hauteur, scrollable -->
        <div class="overflow-y-auto border-b border-gray-200 dark:border-gray-700" style="height: 45%;">
          <div class="space-y-4 p-4">
            <ng-container *ngTemplateOutlet="detailsContent"></ng-container>
          </div>
        </div>

        <!-- Commentaires mobile : reste de la hauteur, scrollable -->
        <div class="flex flex-col overflow-hidden" style="height: 55%;">
          <div class="flex-shrink-0 px-4 py-2 border-b border-gray-200 dark:border-gray-700">
            <ng-container *ngTemplateOutlet="commentairesTitle"></ng-container>
          </div>
          <div class="flex-1 min-h-0 overflow-y-auto px-4 py-3">
            <ng-container *ngTemplateOutlet="commentairesList"></ng-container>
          </div>
        </div>
      </div>

      <!-- DESKTOP : côte à côte, chacun scrollable -->
      <div class="hidden lg:grid lg:grid-cols-5 h-full">

        <!-- Colonne gauche -->
        <div class="col-span-3 overflow-y-auto border-r border-gray-200 dark:border-gray-700 h-full">
          <div class="space-y-6 p-6">
            <ng-container *ngTemplateOutlet="detailsContent"></ng-container>
          </div>
        </div>

        <!-- Colonne droite -->
        <div class="col-span-2 flex flex-col overflow-hidden h-full">
          <div class="flex-shrink-0 px-4 py-3 border-b border-gray-200 dark:border-gray-700">
            <ng-container *ngTemplateOutlet="commentairesTitle"></ng-container>
          </div>
          <div class="flex-1 min-h-0 overflow-y-auto px-4 py-3">
            <ng-container *ngTemplateOutlet="commentairesList"></ng-container>
          </div>
        </div>
      </div>
    </div>
  </div>


<!-- Template : contenu détails (réutilisé mobile + desktop) -->
<ng-template #detailsContent>

  <!-- Description -->
  <div *ngIf="tache!.description" class="text-gray-700 dark:text-gray-300 bg-gray-50 dark:bg-gray-700/30 p-4 rounded-lg border-l-4 border-blue-500">
    <app-editable-text 
      [value]="tache!.description || ''" 
      [multiline]="true" 
      [isCreateur]="isCreateur()"
      (valueChange)="onDescriptionChange($event)">
    </app-editable-text>
  </div>

  <!-- Dates -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
    <div class="flex items-center gap-3 p-3 bg-white dark:bg-gray-700/50 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700">
      <svg class="w-5 h-5 text-gray-500 dark:text-gray-400 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
      <div class="flex items-center gap-2 flex-wrap">
        <span class="font-medium text-gray-600 dark:text-gray-300 whitespace-nowrap">Début :</span>
        <app-editable-date [isCreateur]="isCreateur()" [value]="tache!.dateDebut" [max]="tache!.dateFin" (valueChange)="onDateDebutChange($event)"></app-editable-date>
      </div>
    </div>
    <div class="flex items-center gap-3 p-3 bg-white dark:bg-gray-700/50 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700">
      <svg class="w-5 h-5 text-gray-500 dark:text-gray-400 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
      <div class="flex items-center gap-2 flex-wrap">
        <span class="font-medium text-gray-600 dark:text-gray-300 whitespace-nowrap">Fin :</span>
        <app-editable-date [isCreateur]="isCreateur()" [value]="tache!.dateFin" [min]="tache!.dateDebut" (valueChange)="onDateFinChange($event)"></app-editable-date>
      </div>
    </div>
  </div>

  <!-- Créateur -->
  <div class="flex items-center gap-3 p-3 bg-gray-50 dark:bg-gray-700/30 rounded-lg border border-gray-200 dark:border-gray-700 text-sm">
    <svg class="w-5 h-5 text-gray-500 dark:text-gray-400 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
    </svg>
    <div class="min-w-0">
      <span class="font-medium text-gray-600 dark:text-gray-300">Créateur :</span>
      <span class="ml-2 text-gray-900 dark:text-white">
        {{ tache!.createur?.prenom }} {{ tache!.createur?.nom }} ({{ tache!.createur?.email }})
      </span>
    </div>
  </div>

  <!-- Emails -->
  <div *ngIf="tache!.emails?.length" class="space-y-2">
    <h4 class="text-sm font-semibold text-gray-700 dark:text-gray-300 uppercase tracking-wider flex items-center gap-2">
      <svg class="w-4 h-4 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
      </svg>
      Emails
    </h4>
    <app-email-list
      [emails]="tache!.emails || []"
      [emailType]="'EMAIL_TACHE'"
      [entiteId]="tache!.id"
      [isCreateur]="isCreateur()"
      (emailAdded)="onEmailAdded($event, tache!)"
      (emailUpdated)="onEmailUpdated($event, tache!)"
      (emailDeleted)="onEmailDeleted($event, tache!)">
    </app-email-list>
  </div>

  <!-- Fichiers -->
  <div *ngIf="tache!.fichiers?.length" class="space-y-2">
    <h4 class="text-sm font-semibold text-gray-700 dark:text-gray-300 uppercase tracking-wider flex items-center gap-2">
      <svg class="w-4 h-4 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 107.071 7.071l6.586-6.586" />
      </svg>
      Fichiers
    </h4>
    <app-file-list
      [files]="tache!.fichiers!"
      (viewFile)="onView($event)"
      [isCreateur]="isCreateur()"
      (addFiles)="onAddFichiers($event)"
      (deleteFile)="onDelete($event)">
    </app-file-list>
  </div>
</ng-template>

<!-- Template : titre commentaires -->
<ng-template #commentairesTitle>
  <h4 class="text-sm font-semibold text-gray-700 dark:text-gray-300 uppercase tracking-wider flex items-center gap-2">
    <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
    </svg>
    Commentaires
  </h4>
</ng-template>

<!-- Template : liste commentaires -->
<ng-template #commentairesList>
  <app-commentaire-list
    [parentId]="tache.id"
    [typeElem]="'TACHE'"
    [currentUserId]="currentUserId"
    [currentUserProfilePicture]="currentUserProfilePicture"
    (viewFile)="onView($event)">
  </app-commentaire-list>
</ng-template>

}
