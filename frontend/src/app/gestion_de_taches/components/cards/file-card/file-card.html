<div class="flex items-center justify-between p-2 bg-gray-100 dark:bg-gray-700 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
  <div class="flex items-center min-w-0">
    <mat-icon class="mr-2 text-gray-500 dark:text-gray-400">{{ getFileIcon() }}</mat-icon>
    <span class="text-sm truncate text-gray-900 dark:text-gray-100" [title]="file.nomFichier">{{ file.nomFichier }}</span>
  </div>
  <div class="flex space-x-1 flex-shrink-0">
    <button (click)="onView()" 
            class="p-1 text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded" 
            matTooltip="Visualiser">
      <mat-icon class="text-sm">visibility</mat-icon>
    </button>
    <a [href]="file.url" 
       target="_blank" 
       class="p-1 text-green-600 hover:text-green-800 dark:text-green-400 dark:hover:text-green-300 focus:outline-none focus:ring-2 focus:ring-green-500 rounded" 
       matTooltip="Télécharger" 
       download>
      <mat-icon class="text-sm">download</mat-icon>
    </a>
     @if(isCreateur)
{    <button (click)="onDelete()" 
            class="p-1 text-red-600 hover:text-red-800 dark:text-red-400 dark:hover:text-red-300 focus:outline-none focus:ring-2 focus:ring-red-500 rounded" 
            matTooltip="Supprimer">
      <mat-icon class="text-sm">delete</mat-icon>
    </button>}
  </div>
</div>
