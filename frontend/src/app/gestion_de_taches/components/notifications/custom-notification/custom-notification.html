<div class="notification-overlay" aria-live="polite" aria-atomic="false">
  <div
    *ngFor="let notif of notifications; trackBy: trackById"
    class="notification-card"
    [ngClass]="'notification-' + notif.type"
    role="alert"
  >
    <!-- Icône -->
    <div class="notif-icon dark:text-white mb-2">
      <svg *ngIf="notif.type === 'success'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <svg *ngIf="notif.type === 'error'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
      <svg *ngIf="notif.type === 'warning'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <svg *ngIf="notif.type === 'info'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>

    <!-- Contenu -->
    <div class="notif-content">
      <span class="notif-label dark:text-white mb-2">{{ getLabel(notif.type) }}</span>
      <p class="notif-message dark:text-white mb-2">{{ notif.message }}</p>
    </div>

    <!-- Bouton fermer -->
    <button class="notif-close" (click)="dismiss(notif)" aria-label="Fermer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <!-- Barre de progression -->
    <div class="notif-progress" [style.animation-duration.ms]="notif.duration"></div>
  </div>
</div>
