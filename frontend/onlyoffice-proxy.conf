events {
    worker_connections 1024;
}

http {
    client_max_body_size 200M;

    upstream onlyoffice_backend {
        server onlyoffice:80;
        keepalive 32;
    }

    map $http_host $this_host {
        "" $host;
        default $http_host;
    }

    map $http_x_forwarded_proto $the_scheme {
        default $http_x_forwarded_proto;
        "" $scheme;
    }

    map $http_x_forwarded_host $the_host {
        default $http_x_forwarded_host;
        "" $this_host;
    }

    map $http_upgrade $proxy_connection {
        default upgrade;
        "" close;
    }

    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $the_scheme;
    proxy_set_header X-Forwarded-Host $the_host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $proxy_connection;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;

    server {
        listen 8080;
        server_name localhost;
        server_tokens off;

        # ===============================
        # WebSocket / Endpoints temps réel
        # ===============================
        location ~* ^/([0-9]+\.[0-9]+\.[0-9]+-.*?/doc/|socket\.io|ws|websocket) {
            add_header 'Access-Control-Allow-Origin' '__ALLOWED_ORIGIN__' always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization" always;
            add_header Access-Control-Max-Age 86400 always;

            proxy_pass http://onlyoffice_backend;
            proxy_http_version 1.1;
            proxy_read_timeout 86400s;
            proxy_buffering off;
        }

        # ===============================
        # Toutes les autres requêtes
        # ===============================
        location / {
            # Preflight OPTIONS
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '__ALLOWED_ORIGIN__' always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
                add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '__ALLOWED_ORIGIN__' always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization" always;
            add_header Access-Control-Max-Age 86400 always;

            proxy_pass http://onlyoffice_backend;
            proxy_http_version 1.1;

            proxy_redirect http://onlyoffice_backend/ /;
            proxy_redirect http://onlyoffice_backend /;
            proxy_redirect http://onlyoffice/ /;
            proxy_redirect ~^http://[^/]+/(.*)$ __ONLYOFFICE_PUBLIC_URL__/$1;

            proxy_set_header Accept-Encoding "";

            sub_filter_once off;
            sub_filter_types application/json text/plain text/html;
            sub_filter 'http://onlyoffice_backend' '__ONLYOFFICE_PUBLIC_URL__';
            sub_filter '//onlyoffice_backend' '//__ONLYOFFICE_PUBLIC_HOST__';
            sub_filter 'http://onlyoffice' '__ONLYOFFICE_PUBLIC_URL__';
            sub_filter '//onlyoffice' '//__ONLYOFFICE_PUBLIC_HOST__';

            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}