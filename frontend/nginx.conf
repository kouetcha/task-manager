server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ===============================
    # COMPRESSION
    # ===============================
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ===============================
    # ANGULAR — routing côté client
    # ===============================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===============================
    # PROXY BACKEND — API REST
    # ===============================
    location /tasksmanager/ {
        proxy_pass __BACKEND_URL__/tasksmanager/;
        proxy_set_header Host             $http_host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port __FRONTEND_PORT__;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ===============================
    # ONLYOFFICE — redirect sans slash final
    # ✅ Évite le 301 nginx vers http://localhost/ sans port
    # ONLYOFFICE_BLOCK_START
    # ===============================
    location = /onlyoffice {
        return 301 http://$http_host/onlyoffice/;
    }

    # ===============================
    # WebSocket OnlyOffice
    # ✅ Avant ^~ /onlyoffice/ pour avoir la priorité
    # ===============================
    location ~* ^/onlyoffice/(.+/doc/.+|socket\.io.*) {
        proxy_pass __ONLYOFFICE_URL__/$1$is_args$args;

        proxy_set_header Host             $http_host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade          $http_upgrade;
        proxy_set_header Connection       "upgrade";
        proxy_http_version 1.1;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    # ===============================
    # PROXY ONLYOFFICE
    # ^~ = priorité sur les règles regex ~*
    # ===============================
    location ^~ /onlyoffice/ {
        proxy_pass __ONLYOFFICE_URL__/;

        proxy_set_header Host             $http_host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port __FRONTEND_PORT__;

        proxy_set_header Upgrade          $http_upgrade;
        proxy_set_header Connection       "upgrade";
        proxy_http_version 1.1;

        proxy_redirect ~^https?://[^/]+/(.*)$ /onlyoffice/$1;

        proxy_set_header Accept-Encoding "";

        sub_filter_once off;
        sub_filter_types text/html text/javascript application/javascript application/json text/plain;
        sub_filter 'href="/'   'href="/onlyoffice/';
        sub_filter 'src="/'    'src="/onlyoffice/';
        sub_filter 'url("/'    'url("/onlyoffice/';
        sub_filter "url('/"    "url('/onlyoffice/";
        sub_filter 'action="/' 'action="/onlyoffice/';

        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
    # ONLYOFFICE_BLOCK_END

    # ===============================
    # CACHE FICHIERS STATIQUES Angular
    # ===============================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ===============================
    # SÉCURITÉ
    # ===============================
    #add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}